name: Keepalive
on:
  schedule:
    - cron: "*/10 * * * *"     # every 10 minutes (UTC)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm homepage
        env:
          URL: https://otaku-manga.site/
        # keep the job green even if origin is still waking
        continue-on-error: true
        run: |
          set -u
          # 1) Quick HEAD to trigger wake
          curl -I -sS --connect-timeout 10 --max-time 20 "$URL" || true

          # 2) Poll homepage until it's 2xx/3xx (up to ~2 minutes)
          for i in {1..12}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "Attempt $i -> $code"
            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "Homepage is warm."
              exit 0
            fi
            sleep 10
          done

          echo "Still warming; not failing the workflow."
          exit 0
